<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Meal Plan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1f2e 0%, #14172a 100%);
      color: #f5f7fa;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c4cfe0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #8b95a8;
      font-size: 14px;
    }

    .plan-id {
      margin-top: 10px;
      font-size: 12px;
      color: #8b95a8;
      word-break: break-all;
    }

    .plan-id code {
      background: rgba(45, 55, 72, 0.4);
      padding: 3px 8px;
      border-radius: 6px;
      color: #d4af37;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .goal-badge {
      display: inline-block;
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: #d4af37;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 12px;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #8b95a8;
    }

    .error {
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #f8919e;
      padding: 16px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
    }

    .day-section {
      background: linear-gradient(135deg, rgba(26, 31, 46, 0.6) 0%, rgba(20, 23, 32, 0.8) 100%);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .day-header {
      font-size: 18px;
      font-weight: 600;
      color: #d4af37;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .meal-category {
      margin-bottom: 16px;
    }

    .meal-category-label {
      font-size: 14px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meal-items {
      background: rgba(45, 55, 72, 0.4);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid rgba(212, 175, 55, 0.1);
    }

    .meal-item {
      padding: 8px 0;
      font-size: 14px;
      line-height: 1.5;
      color: #c4cfe0;
      border-bottom: 1px solid rgba(212, 175, 55, 0.05);
    }

    .meal-item:last-child {
      border-bottom: none;
    }

    .meal-item strong {
      color: #f5f7fa;
      font-weight: 600;
    }

    .nutrition-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .nutrition-stat {
      background: rgba(45, 55, 72, 0.6);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid rgba(212, 175, 55, 0.1);
    }

    .nutrition-stat-value {
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
    }

    .nutrition-stat-label {
      font-size: 12px;
      color: #8b95a8;
      margin-top: 4px;
    }

    .disclaimer {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.6;
      color: #d4af37;
    }

    .back-link {
      text-align: center;
      margin-top: 30px;
      padding-bottom: 30px;
    }

    .back-link a {
      color: #00d4ff;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.4);
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 24px;
      }

      .day-section {
        padding: 16px;
        margin-bottom: 16px;
      }

      .nutrition-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍽️ Your Meal Plan</h1>
      <p>Personalized nutrition guidance</p>
      <div class="goal-badge" id="goalBadge">Loading...</div>
      <div class="plan-id">Meal Plan ID: <code id="mealPlanIdDisplay">Loading...</code></div>
    </div>

    <div id="content" class="loading">
      <div style="animation: spin 1s linear infinite;">⏳ Loading meal plan...</div>
    </div>

    <div class="disclaimer">
      ⚠️ <strong>Disclaimer:</strong> This is general nutrition guidance, not medical advice. Consult a registered dietitian for personalized nutrition plans.
    </div>

    <div class="back-link">
      <a href="javascript:history.back()">← Go Back</a>
    </div>
  </div>

  <script>
    const mealIcons = {
      breakfast: '🌅',
      lunch: '🍽️',
      dinner: '🍴',
      snacks: '🥜',
      preWorkout: '⚡',
      postWorkout: '💪',
      hydration: '💧'
    };

    const mealLabels = {
      breakfast: 'Breakfast',
      lunch: 'Lunch',
      dinner: 'Dinner',
      snacks: 'Snacks',
      preWorkout: 'Pre-Workout',
      postWorkout: 'Post-Workout',
      hydration: 'Hydration'
    };

    async function loadMealPlan() {
      try {
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const mealPlanId = pathParts[pathParts.length - 1] || '';

        console.log('Loading meal plan:', mealPlanId);
        const idDisplay = document.getElementById('mealPlanIdDisplay');
        if (idDisplay) idDisplay.textContent = mealPlanId || 'Missing ID';

        if (!mealPlanId) {
          showError('No meal plan ID provided');
          return;
        }

        // Fetch meal plan data from server
        const response = await fetch(`/api/workouts/${encodeURIComponent(mealPlanId)}?share=${Date.now()}`, {
          cache: 'no-store'
        });
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        
        if (!result.success || !result.data) {
          throw new Error('Invalid meal plan data received');
        }

        const mealPlan = result.data;
        console.log('Meal plan data:', mealPlan);

        // Render the meal plan
        renderMealPlan(mealPlan);
      } catch (error) {
        console.error('Error loading meal plan:', error);
        showError('Failed to load meal plan: ' + error.message);
      }
    }

    function renderMealPlan(mealPlan) {
      const content = document.getElementById('content');
      const goalBadge = document.getElementById('goalBadge');

      content.innerHTML = '';

      // Set goal badge
      if (mealPlan.goal) {
        goalBadge.textContent = '🎯 ' + mealPlan.goal.charAt(0).toUpperCase() + mealPlan.goal.slice(1);
      }

      const meals = mealPlan.meals;

      if (!meals) {
        content.innerHTML = '<div class="error">No meal data found</div>';
        return;
      }

      // Check if it's a weekly plan (has day properties) or single day
      const dayKeys = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      const isWeeklyPlan = dayKeys.some(day => meals && meals[day]);

      if (isWeeklyPlan) {
        // Render weekly plan
        renderWeeklyMealPlan(meals, content);
      } else if (Array.isArray(meals)) {
        // Render single day plan (array format)
        renderSingleDayMealPlan(meals, content);
      } else if (typeof meals === 'object') {
        // Render single day plan (object format with meal categories)
        renderSingleDayMealPlanObject(meals, content);
      } else {
        content.innerHTML = '<div class="error">Invalid meal plan format</div>';
      }
    }

    function renderWeeklyMealPlan(weeklyPlan, container) {
      const dayKeys = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      
      dayKeys.forEach(day => {
        if (!weeklyPlan[day]) return;

        const dayPlan = weeklyPlan[day];
        const daySection = document.createElement('div');
        daySection.className = 'day-section';

        const dayHeader = document.createElement('div');
        dayHeader.className = 'day-header';
        dayHeader.textContent = '📅 ' + day;
        daySection.appendChild(dayHeader);

        // Render meals for this day
        renderMealCategories(dayPlan, daySection);

        container.appendChild(daySection);
      });
    }

    function renderSingleDayMealPlan(mealsArray, container) {
      if (!Array.isArray(mealsArray) || mealsArray.length === 0) {
        container.innerHTML = '<div class="error">No meals found</div>';
        return;
      }

      const daySection = document.createElement('div');
      daySection.className = 'day-section';

      const dayHeader = document.createElement('div');
      dayHeader.className = 'day-header';
      dayHeader.textContent = '📅 Today\'s Plan';
      daySection.appendChild(dayHeader);

      // For array format, just display items
      mealsArray.forEach(meal => {
        if (!meal) return;

        const mealCategory = document.createElement('div');
        mealCategory.className = 'meal-category';

        const label = document.createElement('div');
        label.className = 'meal-category-label';
        label.textContent = typeof meal === 'string' ? meal : (meal.name || 'Meal');
        mealCategory.appendChild(label);

        daySection.appendChild(mealCategory);
      });

      container.appendChild(daySection);
    }

    function renderSingleDayMealPlanObject(mealObj, container) {
      const daySection = document.createElement('div');
      daySection.className = 'day-section';

      const dayHeader = document.createElement('div');
      dayHeader.className = 'day-header';
      dayHeader.textContent = '📅 Today\'s Plan';
      daySection.appendChild(dayHeader);

      renderMealCategories(mealObj, daySection);

      container.appendChild(daySection);
    }

    function renderMealCategories(mealData, container) {
      const mealCategoryKeys = ['breakfast', 'lunch', 'dinner', 'snacks', 'preWorkout', 'postWorkout', 'hydration'];

      mealCategoryKeys.forEach(category => {
        const hasCategory = Object.prototype.hasOwnProperty.call(mealData, category);
        if (!hasCategory) return;

        const meals = mealData[category];

        const mealCategory = document.createElement('div');
        mealCategory.className = 'meal-category';

        const label = document.createElement('div');
        label.className = 'meal-category-label';
        label.textContent = (mealIcons[category] || '🍽️') + ' ' + (mealLabels[category] || category);
        mealCategory.appendChild(label);

        const itemsContainer = document.createElement('div');
        itemsContainer.className = 'meal-items';
        let hasAnyContent = false;

        if (Array.isArray(meals)) {
          meals.forEach(meal => {
            if (!meal) return;

            const mealItem = document.createElement('div');
            mealItem.className = 'meal-item';
            
            if (typeof meal === 'string') {
              mealItem.textContent = meal;
            } else if (typeof meal === 'object') {
              if (meal.name) {
                let html = `<strong>${meal.name}</strong>`;
                if (meal.calories) html += ` • ${meal.calories} cal`;
                if (meal.protein) html += ` • ${meal.protein}g protein`;
                if (meal.description) html += `<br><span style="color: #8b95a8; font-size: 12px;">${meal.description}</span>`;
                mealItem.innerHTML = html;
              }
            }

            itemsContainer.appendChild(mealItem);
            hasAnyContent = true;
          });
        } else if (typeof meals === 'object') {
          const mealItem = document.createElement('div');
          mealItem.className = 'meal-item';

          if (meals.name) {
            let html = `<strong>${meals.name}</strong>`;
            if (meals.calories) html += ` • ${meals.calories} cal`;
            if (meals.protein) html += ` • ${meals.protein}g protein`;
            if (meals.focus) html += `<br><span style="color: #8b95a8; font-size: 12px;">${meals.focus}</span>`;
            if (meals.description) html += `<br><span style="color: #8b95a8; font-size: 12px;">${meals.description}</span>`;
            mealItem.innerHTML = html;
          } else {
            mealItem.textContent = JSON.stringify(meals);
          }

          itemsContainer.appendChild(mealItem);
          hasAnyContent = true;
        } else if (typeof meals === 'string') {
          const mealItem = document.createElement('div');
          mealItem.className = 'meal-item';
          mealItem.textContent = meals;
          itemsContainer.appendChild(mealItem);
          hasAnyContent = true;
        }

        if (!hasAnyContent) {
          const emptyItem = document.createElement('div');
          emptyItem.className = 'meal-item';
          emptyItem.style.color = '#8b95a8';
          emptyItem.textContent = 'No meal set';
          itemsContainer.appendChild(emptyItem);
        }

        mealCategory.appendChild(itemsContainer);
        container.appendChild(mealCategory);
      });
    }

    function showError(message) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="error">${message}</div>`;
      content.classList.remove('loading');
    }

    // Load meal plan when page loads
    window.addEventListener('load', loadMealPlan);
  </script>

  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
