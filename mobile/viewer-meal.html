<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meal Plan – RDP's Gym</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0a0e14; color: #f5f7fa; min-height: 100vh; }
    header {
      background: #1a1e28;
      border-bottom: 1px solid #3d4a5c;
      padding: 14px 20px;
    }
    .header-title { color: #d4af37; font-weight: bold; font-size: 1.1rem; }
    .header-sub { color: #a0aec0; font-size: 0.8rem; margin-top: 2px; }
    .content { padding: 16px; max-width: 680px; margin: 0 auto; }
    .meta-card {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .meta-label { font-size: 0.75rem; color: #a0aec0; }
    .meta-value { font-weight: bold; font-size: 1rem; color: #d4af37; }
    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0aec0;
      margin: 16px 0 8px;
    }
    .meal-card {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .meal-name { font-weight: bold; font-size: 1rem; }
    .meal-time {
      font-size: 0.78rem;
      padding: 3px 10px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      color: #d4af37;
    }
    .food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a3040;
      font-size: 0.9rem;
    }
    .food-item:last-child { border-bottom: none; }
    .food-name { color: #f5f7fa; }
    .food-macros { font-size: 0.78rem; color: #a0aec0; }
    .macro-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-left: 4px;
    }
    .macro-cal { background: rgba(239,68,68,0.12); color: #f87171; }
    .macro-pro { background: rgba(0,212,255,0.12); color: #00d4ff; }
    .macro-carb { background: rgba(212,175,55,0.12); color: #d4af37; }
    .macro-fat { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .totals-card {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      text-align: center;
    }
    .total-label { font-size: 0.7rem; color: #a0aec0; margin-bottom: 4px; }
    .total-value { font-size: 1.1rem; font-weight: bold; }
    .notes-box {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 16px;
    }
    .spinner { text-align: center; padding: 40px; color: #a0aec0; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 20px;
      color: #f87171;
      text-align: center;
    }
    .empty { color: #a0aec0; text-align: center; padding: 24px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <div class="header-title" id="planName">🥗 Meal Plan</div>
    <div class="header-sub" id="planDate">Loading…</div>
  </header>

  <div id="mainContent" class="content">
    <div class="spinner">Loading meal plan…</div>
  </div>

  <script>
    const mealPlanId = location.pathname.split('/').pop();

    async function loadMealPlan() {
      const content = document.getElementById('mainContent');
      try {
        const res = await fetch(`/api/workouts/${encodeURIComponent(mealPlanId)}`);
        if (!res.ok) {
          const d = await res.json();
          content.innerHTML = `<div class="error-box">${d.error || 'Meal plan not found.'}</div>`;
          return;
        }
        const { data, created } = await res.json();

        const planName = data?.name || data?.title || 'Meal Plan';
        document.getElementById('planName').textContent = `🥗 ${planName}`;
        document.getElementById('planDate').textContent = new Date(created).toLocaleString();
        document.title = `${planName} – RDP's Gym`;

        const meals = Array.isArray(data?.meals) ? data.meals : [];
        const totalCalories = data?.totalCalories || data?.calories || '';
        const totalProtein = data?.totalProtein || data?.protein || '';
        const totalCarbs = data?.totalCarbs || data?.carbs || '';
        const totalFat = data?.totalFat || data?.fat || '';

        content.innerHTML = '';

        // Meta
        const meta = document.createElement('div');
        meta.className = 'meta-card';
        meta.innerHTML = `
          <div><div class="meta-label">Created</div><div class="meta-value">${new Date(created).toLocaleDateString()}</div></div>
          <div><div class="meta-label">Meals</div><div class="meta-value">${meals.length}</div></div>
          ${data?.goal ? `<div><div class="meta-label">Goal</div><div class="meta-value">${data.goal}</div></div>` : ''}
        `;
        content.appendChild(meta);

        // Totals if available
        if (totalCalories || totalProtein || totalCarbs || totalFat) {
          const totalsTitle = document.createElement('div');
          totalsTitle.className = 'section-title';
          totalsTitle.textContent = 'Daily Totals';
          content.appendChild(totalsTitle);

          const totals = document.createElement('div');
          totals.className = 'totals-card';
          totals.innerHTML = `
            <div><div class="total-label">Calories</div><div class="total-value" style="color:#f87171;">${totalCalories || '—'}</div></div>
            <div><div class="total-label">Protein</div><div class="total-value" style="color:#00d4ff;">${totalProtein || '—'}</div></div>
            <div><div class="total-label">Carbs</div><div class="total-value" style="color:#d4af37;">${totalCarbs || '—'}</div></div>
            <div><div class="total-label">Fat</div><div class="total-value" style="color:#a78bfa;">${totalFat || '—'}</div></div>
          `;
          content.appendChild(totals);
        }

        // Notes
        if (data?.notes || data?.description) {
          const notes = document.createElement('div');
          notes.className = 'notes-box';
          notes.textContent = data.notes || data.description;
          content.appendChild(notes);
        }

        // Meals
        const mealsTitle = document.createElement('div');
        mealsTitle.className = 'section-title';
        mealsTitle.textContent = 'Meals';
        content.appendChild(mealsTitle);

        if (!meals.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'No meals in this plan.';
          content.appendChild(empty);
          return;
        }

        meals.forEach(meal => {
          const mealName = meal.name || meal.meal || 'Meal';
          const mealTime = meal.time || meal.timing || '';
          const foods = Array.isArray(meal.foods) ? meal.foods
            : Array.isArray(meal.items) ? meal.items : [];

          const card = document.createElement('div');
          card.className = 'meal-card';
          card.innerHTML = `
            <div class="meal-header">
              <div class="meal-name">${mealName}</div>
              ${mealTime ? `<div class="meal-time">${mealTime}</div>` : ''}
            </div>
            ${foods.length ? foods.map(f => {
              const fname = f.name || f.food || f.item || f;
              const cal = f.calories || f.cal || '';
              const pro = f.protein || f.pro || '';
              const carb = f.carbs || f.carb || '';
              const fat = f.fat || '';
              const qty = f.quantity || f.amount || f.serving || '';
              return `
                <div class="food-item">
                  <span class="food-name">${fname}${qty ? ` <span style="color:#a0aec0;font-size:0.8rem;">(${qty})</span>` : ''}</span>
                  <span class="food-macros">
                    ${cal ? `<span class="macro-pill macro-cal">${cal}cal</span>` : ''}
                    ${pro ? `<span class="macro-pill macro-pro">${pro}g P</span>` : ''}
                    ${carb ? `<span class="macro-pill macro-carb">${carb}g C</span>` : ''}
                    ${fat ? `<span class="macro-pill macro-fat">${fat}g F</span>` : ''}
                  </span>
                </div>
              `;
            }).join('') : '<div style="color:#a0aec0;font-size:0.85rem;padding:4px 0;">No items listed.</div>'}
          `;
          content.appendChild(card);
        });

      } catch (err) {
        content.innerHTML = `<div class="error-box">Failed to load meal plan. ${err.message}</div>`;
      }
    }

    loadMealPlan();
  </script>
</body>
</html>
