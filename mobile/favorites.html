<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites – RDP's Gym</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0a0e14; color: #f5f7fa; min-height: 100vh; }
    header {
      background: #1a1e28;
      border-bottom: 1px solid #3d4a5c;
      padding: 14px 20px;
    }
    .header-title { color: #d4af37; font-weight: bold; font-size: 1.1rem; }
    .header-sub { color: #a0aec0; font-size: 0.8rem; margin-top: 2px; }
    .content { padding: 16px; max-width: 680px; margin: 0 auto; }
    .meta-card {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .meta-label { font-size: 0.75rem; color: #a0aec0; }
    .meta-value { font-weight: bold; font-size: 1rem; color: #d4af37; }
    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a0aec0;
      margin-bottom: 10px;
    }
    .exercise-card {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .exercise-num {
      width: 28px;
      height: 28px;
      background: rgba(212,175,55,0.15);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      color: #d4af37;
      flex-shrink: 0;
    }
    .exercise-name { font-weight: bold; font-size: 0.95rem; }
    .exercise-meta { font-size: 0.8rem; color: #a0aec0; margin-top: 3px; }
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,212,255,0.1);
      color: #00d4ff;
      border: 1px solid rgba(0,212,255,0.25);
      margin-right: 4px;
    }
    .spinner { text-align: center; padding: 40px; color: #a0aec0; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 20px;
      color: #f87171;
      text-align: center;
      margin-top: 12px;
    }
    .empty { color: #a0aec0; text-align: center; padding: 24px; font-size: 0.9rem; }
    .notes-box {
      background: #1a1e28;
      border: 1px solid #3d4a5c;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">⭐ Favorites</div>
    <div class="header-sub" id="favOwner">Loading…</div>
  </header>

  <div id="mainContent" class="content">
    <div class="spinner">Loading favorites…</div>
  </div>

  <script>
    const favoritesId = location.pathname.split('/').pop();

    async function loadFavorites() {
      const content = document.getElementById('mainContent');
      try {
        const res = await fetch(`/api/favorites/${encodeURIComponent(favoritesId)}`);
        if (!res.ok) {
          const d = await res.json();
          content.innerHTML = `<div class="error-box">${d.message || 'Favorites not found.'}</div>`;
          return;
        }
        const { data, created, username } = await res.json();
        const ownerName = username || data?.username || 'User';
        document.getElementById('favOwner').textContent = `${ownerName}'s Favorites`;
        document.title = `${ownerName}'s Favorites – RDP's Gym`;

        const exercises = Array.isArray(data?.exercises) ? data.exercises
          : Array.isArray(data?.favorites) ? data.favorites : [];

        content.innerHTML = '';

        // Meta
        const meta = document.createElement('div');
        meta.className = 'meta-card';
        meta.innerHTML = `
          <div><div class="meta-label">Owner</div><div class="meta-value">${ownerName}</div></div>
          <div><div class="meta-label">Saved</div><div class="meta-value">${new Date(created).toLocaleDateString()}</div></div>
          <div><div class="meta-label">Exercises</div><div class="meta-value">${exercises.length}</div></div>
        `;
        content.appendChild(meta);

        // Notes
        if (data?.notes) {
          const notes = document.createElement('div');
          notes.className = 'notes-box';
          notes.textContent = data.notes;
          content.appendChild(notes);
        }

        // Exercise list
        const titleEl = document.createElement('div');
        titleEl.className = 'section-title';
        titleEl.textContent = 'Favorite Exercises';
        content.appendChild(titleEl);

        if (!exercises.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'No favorite exercises saved.';
          content.appendChild(empty);
          return;
        }

        exercises.forEach((ex, i) => {
          const name = ex.name || ex.exercise || ex.title || ex;
          const muscleGroup = ex.muscleGroup || ex.muscle || '';
          const sets = ex.sets || '';
          const reps = ex.reps || '';

          const card = document.createElement('div');
          card.className = 'exercise-card';
          card.innerHTML = `
            <div class="exercise-num">${i + 1}</div>
            <div>
              <div class="exercise-name">${name}</div>
              <div class="exercise-meta">
                ${muscleGroup ? `<span class="tag">${muscleGroup}</span>` : ''}
                ${sets ? `${sets} sets` : ''}${sets && reps ? ' × ' : ''}${reps ? `${reps} reps` : ''}
              </div>
            </div>
          `;
          content.appendChild(card);
        });

      } catch (err) {
        content.innerHTML = `<div class="error-box">Failed to load favorites. ${err.message}</div>`;
      }
    }

    loadFavorites();
  </script>
</body>
</html>
